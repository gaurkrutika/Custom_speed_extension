<!DOCTYPE html>
<html lang="en">
<head>
    <title>Video Speed Controller</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h2>Set Custom Speed</h2>
    <input type="number" id="speedInput" step="0.1" min="0.1" placeholder="Enter speed (e.g., 1.5)">
    <button id="saveSpeed">Save Speed</button>
    <p id="timeSaved">Time Saved: 0 mins</p>
    <script src="popup.js"></script>
</body>
</html>
